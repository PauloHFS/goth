definitions:
  billing.PaymentResult:
    properties:
      invoiceUrl:
        type: string
      paymentId:
        type: string
      pixCopyPaste:
        type: string
      pixQrCode:
        type: string
    type: object
  featureflags.FeatureFlag:
    properties:
      created_at:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      metadata:
        description: JSON adicional para config
        type: string
      name:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  featureflags.FeatureFlagInput:
    properties:
      description:
        type: string
      enabled:
        type: boolean
      metadata:
        type: string
      name:
        type: string
      tenant_id:
        type: string
    type: object
  logging.LevelRequest:
    properties:
      level:
        type: string
    type: object
  logging.LevelResponse:
    properties:
      level:
        type: string
    type: object
  secrets.RotateRequest:
    properties:
      type:
        type: string
      value:
        type: string
    type: object
  secrets.Status:
    properties:
      last_reload:
        type: string
      missing_secrets:
        items:
          type: string
        type: array
      secrets_loaded:
        type: integer
      watcher_enabled:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /api/feature-flags:
    get:
      description: Returns a list of all feature flags for the tenant
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/featureflags.FeatureFlag'
            type: array
      summary: List all feature flags
      tags:
      - Feature Flags
    post:
      consumes:
      - application/json
      description: Creates a new feature flag
      parameters:
      - description: Feature flag data
        in: body
        name: flag
        required: true
        schema:
          $ref: '#/definitions/featureflags.FeatureFlagInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/featureflags.FeatureFlag'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create feature flag
      tags:
      - Feature Flags
  /api/feature-flags/{id}:
    delete:
      description: Deletes a feature flag
      parameters:
      - description: Feature flag ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete feature flag
      tags:
      - Feature Flags
    put:
      consumes:
      - application/json
      description: Updates an existing feature flag
      parameters:
      - description: Feature flag ID
        in: path
        name: id
        required: true
        type: integer
      - description: Feature flag data
        in: body
        name: flag
        required: true
        schema:
          $ref: '#/definitions/featureflags.FeatureFlagInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/featureflags.FeatureFlag'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update feature flag
      tags:
      - Feature Flags
  /api/feature-flags/{id}/toggle:
    post:
      description: Toggles a feature flag enabled/disabled state
      parameters:
      - description: Feature flag ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/featureflags.FeatureFlag'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Toggle feature flag
      tags:
      - Feature Flags
  /api/feature-flags/{name}:
    get:
      description: Returns a specific feature flag by name
      parameters:
      - description: Feature flag name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/featureflags.FeatureFlag'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get feature flag by name
      tags:
      - Feature Flags
  /api/feature-flags/check/{name}:
    get:
      description: Checks if a feature flag is enabled
      parameters:
      - description: Feature flag name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Check feature flag status
      tags:
      - Feature Flags
  /api/log-level:
    get:
      description: Returns the current application log level
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/logging.LevelResponse'
      summary: Get current log level
      tags:
      - Logging
    put:
      consumes:
      - application/json
      description: Sets the application log level dynamically
      parameters:
      - description: New log level (debug, info, warn, error)
        in: body
        name: level
        required: true
        schema:
          $ref: '#/definitions/logging.LevelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/logging.LevelResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set log level
      tags:
      - Logging
  /api/secrets/reload:
    post:
      description: Forces a manual reload of secrets from .env file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reload secrets
      tags:
      - Secrets
  /api/secrets/rotate:
    post:
      consumes:
      - application/json
      description: Rotates a specific secret (in-memory only)
      parameters:
      - description: Secret type and new value
        in: body
        name: secret
        required: true
        schema:
          $ref: '#/definitions/secrets.RotateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Rotate secret
      tags:
      - Secrets
  /api/secrets/status:
    get:
      description: Returns the current status of the secret manager
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/secrets.Status'
      summary: Get secrets status
      tags:
      - Secrets
  /checkout/subscribe:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new payment/subscription
      parameters:
      - description: Plan value in cents
        in: formData
        name: plan_value
        required: true
        type: string
      - description: Billing type (PIX, BOLETO, CREDIT_CARD)
        in: formData
        name: billing_type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/billing.PaymentResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Subscribe to plan
      tags:
      - Billing
  /events:
    get:
      description: Establishes Server-Sent Events connection for real-time notifications
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: SSE notifications
      tags:
      - Real-time
  /forgot-password:
    get:
      description: Displays the password recovery form
      produces:
      - text/html
      responses:
        "200":
          description: Forgot password form HTML
          schema:
            type: string
      summary: Show forgot password form
      tags:
      - Authentication
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Sends password reset email if user exists
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Confirmation message
          schema:
            type: string
      summary: Request password reset
      tags:
      - Authentication
  /login:
    get:
      description: Displays the user login form
      produces:
      - text/html
      responses:
        "200":
          description: Login form HTML
          schema:
            type: string
      summary: Show login form
      tags:
      - Authentication
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticates user and creates session
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Login form with error
          schema:
            type: string
        "303":
          description: Redirect to dashboard on success
      summary: Login user
      tags:
      - Authentication
  /logout:
    post:
      description: Destroys user session and redirects to login
      produces:
      - text/html
      responses:
        "303":
          description: Redirect to login
      summary: Logout user
      tags:
      - Authentication
  /register:
    get:
      description: Displays the user registration form
      produces:
      - text/html
      responses:
        "200":
          description: Registration form HTML
          schema:
            type: string
      summary: Show registration form
      tags:
      - Authentication
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new user account
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Registration form with error
          schema:
            type: string
        "303":
          description: Redirect to login on success
      summary: Register new user
      tags:
      - Authentication
  /reset-password:
    get:
      description: Displays the password reset form with token
      parameters:
      - description: Reset token
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Reset password form HTML
          schema:
            type: string
      summary: Show reset password form
      tags:
      - Authentication
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Resets user password using valid token
      parameters:
      - description: Reset token
        in: formData
        name: token
        required: true
        type: string
      - description: New password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Reset form with error
          schema:
            type: string
        "303":
          description: Redirect to login on success
      summary: Reset password
      tags:
      - Authentication
  /verify-email:
    get:
      description: Verifies user email using token
      parameters:
      - description: Verification token
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Redirect to login with success message
      summary: Verify email
      tags:
      - Authentication
  /webhook/asaas:
    post:
      consumes:
      - application/json
      description: Processes payment webhooks from Asaas
      parameters:
      - description: Webhook signature
        in: header
        name: asaas-hmac-sha256
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Process Asaas webhook
      tags:
      - Billing
swagger: "2.0"
