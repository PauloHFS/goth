name: Backup Verification

on:
  schedule:
    # Run every Sunday at 6:00 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      backup_url:
        description: 'S3 backup URL to verify (leave empty for latest)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-backup:
    name: Verify Backup Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ vars.BACKUP_VERIFICATION_ENABLED != 'false' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          cache: true

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Download Go modules
        run: go mod download

      - name: Install Litestream
        run: |
          curl -L https://litestream.io/install | sudo bash
          litestream version

      - name: Configure AWS Credentials
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Get Latest Backup URL
        id: backup_url
        if: ${{ github.event_name == 'schedule' || github.event.inputs.backup_url == '' }}
        run: |
          echo "Fetching latest backup URL..."
          # Try to get latest backup from S3
          if [ -n "${{ secrets.AWS_S3_BACKUP_PATH }}" ]; then
            BACKUP_URL=$(aws s3 ls "${{ secrets.AWS_S3_BACKUP_PATH }}" --recursive \
              --query "sort_by(Contents, &Size)[-1].Key" --output text 2>/dev/null || echo "")
            if [ -n "$BACKUP_URL" ]; then
              echo "backup_url=${{ secrets.AWS_S3_BACKUP_PATH }}$BACKUP_URL" >> $GITHUB_OUTPUT
              echo "Latest backup: $BACKUP_URL"
            else
              echo "No backups found in S3"
              echo "backup_url=" >> $GITHUB_OUTPUT
            fi
          else
            echo "AWS_S3_BACKUP_PATH not configured"
            echo "backup_url=" >> $GITHUB_OUTPUT
          fi

      - name: Verify Backup Integrity
        id: verify
        run: |
          echo "Starting backup verification..."
          
          BACKUP_URL="${{ github.event.inputs.backup_url || steps.backup_url.outputs.backup_url }}"
          
          if [ -z "$BACKUP_URL" ]; then
            echo "::error::No backup URL available. Configure AWS_S3_BACKUP_PATH secret."
            exit 1
          fi
          
          echo "Verifying backup: $BACKUP_URL"
          
          # Create temp directory
          TEMP_DIR=$(mktemp -d)
          TEMP_DB="$TEMP_DIR/verify.db"
          
          echo "Downloading backup to: $TEMP_DB"
          
          # Download backup using litestream
          if ! litestream restore -v "$BACKUP_URL" "$TEMP_DB" 2>&1; then
            echo "::error::Failed to download backup"
            exit 1
          fi
          
          echo "Running integrity checks..."
          
          # SQLite integrity check
          echo "=== PRAGMA integrity_check ==="
          INTEGRITY=$(sqlite3 "$TEMP_DB" "PRAGMA integrity_check;")
          echo "$INTEGRITY"
          
          if [ "$INTEGRITY" != "ok" ]; then
            echo "::error::Database integrity check failed!"
            exit 1
          fi
          
          echo "✓ Integrity check passed"
          
          # Check required tables
          echo "=== Checking required tables ==="
          REQUIRED_TABLES=("users" "audit_log" "jobs" "sessions" "feature_flags")
          MISSING_TABLES=0
          
          for table in "${REQUIRED_TABLES[@]}"; do
            EXISTS=$(sqlite3 "$TEMP_DB" "SELECT name FROM sqlite_master WHERE type='table' AND name='$table';")
            if [ -z "$EXISTS" ]; then
              echo "⚠ Table not found: $table (may not exist yet)"
            else
              COUNT=$(sqlite3 "$TEMP_DB" "SELECT COUNT(*) FROM $table;")
              echo "✓ Table $table: $COUNT rows"
            fi
          done
          
          # Database size
          DB_SIZE=$(stat -c%s "$TEMP_DB" 2>/dev/null || stat -f%z "$TEMP_DB" 2>/dev/null || echo "0")
          echo "=== Database size: $DB_SIZE bytes ==="
          
          if [ "$DB_SIZE" -eq 0 ]; then
            echo "::warning::Database file is empty"
          fi
          
          # Quick query test
          echo "=== Running test queries ==="
          sqlite3 "$TEMP_DB" "SELECT COUNT(*) FROM users;" || true
          sqlite3 "$TEMP_DB" "SELECT COUNT(*) FROM jobs WHERE status='pending';" || true
          
          # Cleanup
          rm -rf "$TEMP_DIR"
          
          echo "✓ Backup verification completed successfully!"

      - name: Upload Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-verification-report
          path: |
            /tmp/verify-*.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Backup verification completed successfully!"
          echo "Backup URL: ${{ github.event.inputs.backup_url || steps.backup_url.outputs.backup_url }}"
          echo "Run ID: ${{ github.run_id }}"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Backup verification failed!"
          echo "Check the workflow logs for details."
          exit 1
