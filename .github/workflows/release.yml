name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Download Go modules
        run: go mod download

      - name: Generate Code
        run: |
          go tool templ generate
          go tool sqlc generate
          go tool swag init -g internal/cmd/server.go
          npx @tailwindcss/cli -i ./web/static/assets/css/input.css -o ./web/static/assets/styles.css --minify

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build -tags fts5 \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o goth-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/api

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: goth-${{ matrix.os }}-${{ matrix.arch }}
          generate_release_notes: false

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "## What's Changed" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> /tmp/changelog.md
          else
            echo "Initial release" >> /tmp/changelog.md
          fi
          
          echo "" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> /tmp/changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          generate_release_notes: false
          make_latest: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc.') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - name: Release Status
        run: |
          if [ "${{ needs.release.result }}" == "success" ]; then
            echo "✅ Release ${{ github.ref_name }} published successfully!"
          else
            echo "❌ Release ${{ github.ref_name }} failed!"
            exit 1
          fi
