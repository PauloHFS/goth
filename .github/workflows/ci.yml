name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Go Tests
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run tests
        run: |
          go test ./... -v -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out -o coverage.txt
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: go
          name: go-coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.txt

  # Go Lint
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
      
      - name: go vet
        run: go vet ./...
      
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files found:"
            echo "$unformatted"
            exit 1
          fi

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      
      - name: Run gosec
        run: gosec ./...
      
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Frontend Tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npx vitest run --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage-final.json
          flags: javascript
          name: js-coverage
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  # Frontend Lint
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npx eslint web/static/js/ --max-warnings=0
      
      - name: Run Prettier check
        run: npx prettier --check web/

  # Bundle Analysis
  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run bundle analyzer
        run: node scripts/bundle-analyzer.js
      
      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: web/static/bundle-report.json

  # Accessibility Tests
  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Puppeteer
        run: npx puppeteer browsers install chrome
      
      - name: Start server
        run: |
          go build -o bin/goth ./cmd/...
          ./bin/goth &
          sleep 5
      
      - name: Run accessibility tests
        run: node test/a11y-test.js
        env:
          TEST_BASE_URL: http://localhost:8080
      
      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: test-results/accessibility-report.json

  # E2E Tests
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          go mod download
          npm ci
      
      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run database migrations
        run: |
          go build -o bin/goth ./cmd/...
          ./bin/goth migrate
      
      - name: Start server
        run: |
          ./bin/goth server &
          echo $! > server.pid
        shell: bash

      - name: Wait for server to be ready
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 60
          retry_wait: 2
          max_attempts: 30
          command: curl -f http://localhost:8080/health || exit 1
      
      - name: Run E2E tests
        run: npx playwright test
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # Build Check
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          go mod download
          npm ci
      
      - name: Generate code
        run: go generate ./...
      
      - name: Build
        run: go build -o bin/goth ./cmd/...
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: goth-binary
          path: bin/goth

  # Performance Budget (Lighthouse)
  performance:
    name: Performance Budget
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Lighthouse
        run: npm install -g lighthouse
      
      - name: Start server
        run: |
          go build -o bin/goth ./cmd/...
          ./bin/goth &
          sleep 5
      
      - name: Run Lighthouse
        run: |
          mkdir -p lighthouse-report
          lighthouse http://localhost:8080 \
            --output=html \
            --output=json \
            --output-path=lighthouse-report \
            --chrome-flags="--headless" \
            --preset=desktop \
            --throttling.cpuSlowdownMultiplier=1
      
      - name: Check performance budgets
        run: |
          # Extract performance scores
          SCORES=$(cat lighthouse-report/*.json | jq '.[0].categories | {performance: .performance.score, accessibility: .accessibility.score, bestPractices: .best_practices.score, seo: .seo.score}')
          echo "Lighthouse Scores: $SCORES"
          
          # Check if performance score is above 90
          PERF_SCORE=$(echo $SCORES | jq '.performance')
          if (( $(echo "$PERF_SCORE < 0.9" | bc -l) )); then
            echo "Performance score ($PERF_SCORE) is below 0.9 threshold"
            exit 1
          fi
      
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report/
