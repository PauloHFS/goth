version: 2
updates:
  # Go modules - security and version updates
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "PauloHFS"
    assignees:
      - "PauloHFS"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      go-security:
        applies-to: security-updates
        patterns:
          - "*"
      go-minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates for critical dependencies until reviewed
      - dependency-name: "golang.org/x/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "github.com/go-playground/validator/*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions - security and version updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "PauloHFS"
    assignees:
      - "PauloHFS"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci/cd"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # NPM dependencies - security and version updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "PauloHFS"
    assignees:
      - "PauloHFS"
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates for critical frontend dependencies
      - dependency-name: "htmx.org"
        update-types: ["version-update:semver-major"]
      - dependency-name: "alpinejs"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/*"
        update-types: ["version-update:semver-major"]

  # Docker dependencies - version updates for base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "PauloHFS"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
