# ===========================================
# Alertmanager Configuration
# ===========================================
# Notificações de alertas do Prometheus

global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Templates para formatação de mensagens
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Roteamento de alertas
route:
  group_by: ['alertname', 'severity', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-notifications'
  
  # Rotas específicas por severidade
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'slack-notifications'
    - match:
        severity: info
      receiver: 'slack-notifications'
      group_wait: 5m
      repeat_interval: 12h

# Inibição de alertas (alertas menos severos quando críticos estão ativos)
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']

# Receivers (destinos de notificação)
receivers:
  # Slack para alertas gerais
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  # PagerDuty para alertas críticos
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        description: '{{ template "pagerduty.description" . }}'
        severity: 'critical'

  # Email como fallback
  - name: 'email-notifications'
    email_configs:
      - to: '${ALERT_EMAIL}'
        from: 'alertmanager@goth.com'
        smarthost: '${SMTP_HOST}:${SMTP_PORT}'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASS}'
        send_resolved: true

# Webhook genérico para integrações customizadas
webhook_configs: []
#  - url: 'http://custom-webhook/alerts'
#    send_resolved: true
