# ===========================================
# Traefik Configuration
# ===========================================
# Main configuration file for Traefik v3
#
# For more options: https://doc.traefik.io/traefik/v3.0/reference/configuration-file/

api:
  dashboard:
    enabled: true
    insecure: true  # Only for development!

# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
          priority: 100

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

# Let's Encrypt Configuration
certificatesResolvers:
  letsencrypt:
    acme:
      email: paulohernane10@gmail.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web
      # TLS Challenge (faster, doesn't need port 80)
      # tlsChallenge: true

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: goth-network
    watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true

# Logging
log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

# Access Log
accessLog:
  filePath: /var/log/traefik/access.log

# Metrics (Prometheus)
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: metrics

ping:
  entryPoint: web
