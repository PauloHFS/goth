# Casbin RBAC Model for GOTH Stack
# This model supports role-based access control with resource ownership

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _
g2 = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# User can perform action if:
# 1. User has role that allows it, OR user is directly allowed
# 2. Resource matches OR user owns the resource
# 3. Action matches
m = (g(r.sub, p.sub) || r.sub == p.sub) && (r.obj == p.obj || r.obj == p.sub) && r.act == p.act
